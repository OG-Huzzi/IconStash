<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting to IconStash...</title>
  <script>
    (() => {
      const path = window.location.pathname;
      if (path.startsWith("/icons/")) {
        const parts = path.split("/").filter(Boolean);
        const slug = parts[parts.length - 1];
        if (slug) {
          // If the slug ends with standard keywords, extract the base icon ID
          let cleanId = slug;
          if (cleanId.endsWith("-icon-svg")) cleanId = cleanId.slice(0, -9);
          else if (cleanId.endsWith("-icon-png")) cleanId = cleanId.slice(0, -9);
          else if (cleanId.endsWith("-svg-and-png-download")) cleanId = cleanId.slice(0, -21);
          
          window.location.replace("/#/icon/" + encodeURIComponent(cleanId));
          return;
        }
      }
      window.location.replace("/#/");
    })();
  </script>
</head>
<body>
  <p>Redirecting to IconStash...</p>
</body>
</html>
